services:
  - type: web
    name: teamflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false        # set to your Vercel URL after deploying frontend
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
